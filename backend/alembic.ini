# =============================================================================
# alembic.ini
# Alembic Konfigürasyon Dosyası
# UYARI: sqlalchemy.url burada boş bırakıldı.
#        Gerçek URL, env.py içinde os.environ["DATABASE_URL"] üzerinden okunur.
#        Bu sayede .env dosyasındaki değer tek kaynak olarak kalır.
# =============================================================================

[alembic]

# Migration script'lerinin konumu (alembic.ini'ye göre relatif)
script_location = alembic

# Üretilen migration dosyalarının isim formatı: <timestamp>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Alembic'in arayacağı Python sys.path eklemeleri (virgülle ayrılır)
# "." → backend/ dizinini path'e ekler; src.database importu için gerekli
prepend_sys_path = .

# timezone = UTC

# Sürüm klasörü (versions/) içinde birden fazla migration kaynağı yok
# version_locations = %(here)s/alembic/versions

# Truncate uzun satırları — diff okunabilirliği
truncate_slug_length = 40

# sqlalchemy.url — KASITLI OLARAK BOŞ.
# env.py içinde DATABASE_URL environment variable'ından okunur.
sqlalchemy.url =


# =============================================================================
# Logging — Alembic çıktılarını yapılandırır
# =============================================================================

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
