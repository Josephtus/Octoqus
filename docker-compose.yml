version: "3.9"

# =============================================================================
# Expense Tracking & Social Finance Platform
# Docker Compose - Infrastructure Definition
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0 - Primary Relational Database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: expense_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init_db:/docker-entrypoint-initdb.d # SQL init scripts (ileride)
    networks:
      - expense_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M # MySQL max 1 GB RAM
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache + Rate Limiting + Pub/Sub (Chat) + Task Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: expense_redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - expense_net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M # Redis max 512 MB RAM
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Backend - Sanic Async API + WebSocket Server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Geliştirme: hot-reload için mount
    networks:
      - expense_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1024M # Backend max 1 GB RAM
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Frontend - React (Vite) MVP
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: expense_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Hosttaki node_modules karmaşasını önlemek için
    ports:
      - "5173:5173"
    # Konteyner kalktığında paketleri kurup Vite sunucusunu dışa açık başlatır
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - expense_net
    depends_on:
      - backend

# =============================================================================
# Named Volumes - Kalıcı Depolama
# =============================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks - Servisler arası izole iletişim
# =============================================================================
networks:
  expense_net:
    driver: bridge
