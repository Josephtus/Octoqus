version: "3.9"

# =============================================================================
# Octoqus - Expense Tracking & Social Finance Platform
# Docker Compose - Infrastructure Definition
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0 - Primary Relational Database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0-debian
    container_name: octoqus_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: supersecret_root_pass
      MYSQL_DATABASE: octoqus_db
      MYSQL_USER: octoqus_user
      MYSQL_PASSWORD: supersecret_db_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - octoqus_net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Redis 7 - Cache + Rate Limiting + Pub/Sub (Chat) + Task Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: octoqus_redis
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - octoqus_net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M # Redis max 512 MB RAM
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # Backend - Sanic Async API + WebSocket Server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: octoqus_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SANIC_WORKER_STARTUP_TIMEOUT=60.0
      - SANIC_GRACEFUL_SHUTDOWN_TIMEOUT=60.0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Geliştirme: hot-reload için mount
    networks:
      - octoqus_net
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M # Backend max 1 GB RAM
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Frontend - React (Vite) MVP
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: octoqus_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Hosttaki node_modules karmaşasını önlemek için
    ports:
      - "5173:5173"
    # Konteyner kalktığında paketleri kurup Vite sunucusunu dışa açık başlatır
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - octoqus_net
    depends_on:
      - backend

# =============================================================================
# Named Volumes - Kalıcı Depolama
# =============================================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks - Servisler arası izole iletişim
# =============================================================================
networks:
  octoqus_net:
    driver: bridge
